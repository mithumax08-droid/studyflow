{% extends 'base.html' %}
{% block title %}{{ 'Edit Task' if task else 'Add Task' }}{% endblock %}
{% block page_title %}{{ 'Edit Task' if task else 'Add New Task' }}{% endblock %}

{% block topbar_actions %}
  <a href="{{ url_for('tasks') }}" class="btn btn-ghost">← Back to Tasks</a>
{% endblock %}

{% block content %}
<div class="form-card">
  <form method="POST" action="{{ url_for('edit_task', task_id=task.id) if task else url_for('add_task') }}">

    <div class="form-group">
      <label class="form-label">Task Name *</label>
      <input type="text" name="name" class="form-input" placeholder="e.g. Math homework chapter 5"
             value="{{ task.name if task else '' }}" required>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Category</label>
        <select name="category" class="form-input">
          {% for val, label in [('homework','📚 Homework'),('assignment','📝 Assignment'),('exam','📖 Exam'),('report','📄 Report'),('project','🔧 Project')] %}
            <option value="{{ val }}" {{ 'selected' if task and task.category == val }}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select name="priority" class="form-input">
          {% for val, label in [('high','🔴 High'),('medium','🟡 Medium'),('low','🟢 Low')] %}
            <option value="{{ val }}" {{ 'selected' if task and task.priority == val }}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Subject</label>
        <input type="text" name="subject" class="form-input" placeholder="e.g. Mathematics"
               value="{{ task.subject if task else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">Deadline *</label>
        <input type="date" name="deadline" class="form-input"
               value="{{ task.deadline.isoformat() if task and task.deadline else '' }}" required>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea name="notes" class="form-input form-textarea" placeholder="Any extra details...">{{ task.notes if task else '' }}</textarea>
    </div>

    <div class="form-actions">
      <a href="{{ url_for('tasks') }}" class="btn btn-ghost">Cancel</a>
      <button type="submit" class="btn btn-primary">{{ '💾 Update Task' if task else '＋ Save Task' }}</button>
    </div>

  </form>
</div>
{% endblock %}
